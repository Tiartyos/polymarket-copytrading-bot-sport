# CLOB API base URL (mainnet)
clob_host = "https://clob.polymarket.com"

chain_id = 137

# Web UI port (env PORT overrides)
port = 8000

# When true, log trades but do not execute
simulation = false

[copy]
# Single address: websocket. Multiple: polling positions API.
target_address = [
    "0x1979ae6B7E6534dE9c4539D0c205E582cA637C9D",
    "0x204f72f35326db932158cba6adff0b9a1da95e14",
    "0x6bab41a0dc40d6dd4c1a915b8c01969479fd1292"
]
revert_trade = false
# Multiply copied trade size by this (1.0 = same size)
# 0.005 = 0.5% of leader's trade size (conservative for $95 bankroll)
size_multiplier = 0.005

# Polling interval (sec) when using multiple targets
poll_interval_sec = 15

[exit]
# Take profit at this % gain (0 = disabled)
take_profit = 50
# Stop loss at this % loss (0 = disabled)
stop_loss = 25
# Trailing stop at this % (0 = disabled)
trailing_stop = 0

[filter]
# Max USD to spend per copied trade (0 = no limit)
# Cap at $5 per trade to preserve capital
buy_amount_limit_in_usd = 5

# Only copy trades made within the last N seconds (0 = no filter)
entry_trade_sec = 0

# Skip if market resolves within N seconds (0 = no filter)
trade_sec_from_resolve = 0

[ui]
# How long (seconds) to show positions with balance changes at top of Live positions (0 = use default 10)
delta_highlight_sec = 10
# Duration (seconds) for the +/- delta animation highlight (0 = use default 2)
delta_animation_sec = 2


